name: Inject Secrets into Config

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create config with secrets
        run: |
          cat > config.js << 'ENDOFFILE'
          const WEBHOOKS = {
              "announcements": "${{ secrets.ANNOUNCEMENTS_WEBHOOK }}",
              "mod-announcements": "${{ secrets.MOD_ANNOUNCEMENTS_WEBHOOK }}",
              "info": "${{ secrets.INFO_WEBHOOK }}",
              "paid-roles": "${{ secrets.PAID_ROLES_WEBHOOK }}",
              "rules": "${{ secrets.RULES_WEBHOOK }}",
              "request-middleman": "${{ secrets.REQUEST_MIDDLEMAN_WEBHOOK }}"
          };
          ENDOFFILE
      
      - name: Commit config
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add config.js
          git commit -m "Auto-inject webhook secrets" || true
          git push
